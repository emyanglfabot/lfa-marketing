<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contributor Dashboard — Land Far Away</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal: #6DCEC5;
      --teal-dark: #3EB5AD;
      --orange: #E85A2B;
      --orange-dark: #C44A20;
      --gold: #F5C442;
      --charcoal: #3A3632;
      --cream: #F5F0E1;
      --muted: #7A7062;
      --white: #fff;
      --red: #E53E3E;
      --green: #38A169;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--cream);
      color: var(--charcoal);
      min-height: 100vh;
    }

    /* Nav */
    .nav {
      background: var(--white);
      border-bottom: 1px solid rgba(58,54,50,0.08);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo { height: 36px; }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.9rem;
    }

    .nav-name {
      color: var(--muted);
      font-weight: 600;
    }

    .nav-logout {
      color: var(--teal-dark);
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
    }

    .nav-logout:hover { text-decoration: underline; }

    /* Main content */
    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 1.5rem 3rem;
    }

    .greeting {
      font-family: 'Baloo 2', cursive;
      font-weight: 800;
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
    }

    /* Kid tabs */
    .kid-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.75rem;
      flex-wrap: wrap;
    }

    .kid-tab {
      padding: 0.5rem 1.25rem;
      border-radius: 2rem;
      border: 2px solid var(--teal);
      background: var(--white);
      color: var(--charcoal);
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .kid-tab:hover { background: rgba(109,206,197,0.1); }

    .kid-tab.active {
      background: var(--teal);
      color: var(--white);
      border-color: var(--teal);
    }

    /* Cards grid */
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
      margin-bottom: 2.5rem;
    }

    .card {
      background: var(--white);
      border-radius: 1.25rem;
      padding: 1.5rem;
      text-align: center;
      box-shadow: 0 4px 16px rgba(58,54,50,0.06);
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(58,54,50,0.10);
    }

    .card-icon {
      width: 72px;
      height: 72px;
      object-fit: contain;
      margin-bottom: 0.75rem;
    }

    .card-title {
      font-family: 'Baloo 2', cursive;
      font-weight: 700;
      font-size: 1.1rem;
      margin-bottom: 0.35rem;
    }

    .card-desc {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 1rem;
      flex: 1;
    }

    .card-actions {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .btn {
      display: inline-block;
      background: var(--orange);
      color: var(--white);
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      border: none;
      border-radius: 2rem;
      padding: 0.65rem 1.5rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      width: 100%;
    }

    .btn:hover { background: var(--orange-dark); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .btn-outline {
      background: var(--white);
      color: var(--orange);
      border: 2px solid var(--orange);
    }

    .btn-outline:hover {
      background: rgba(232,90,43,0.06);
    }

    /* Progress bar */
    .progress-wrap {
      width: 100%;
      height: 8px;
      background: #eee;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 0.75rem;
    }

    .progress-bar {
      height: 100%;
      background: var(--teal);
      border-radius: 4px;
      transition: width 0.3s;
      width: 0%;
    }

    /* Upload states */
    .upload-status {
      margin-top: 0.75rem;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .upload-status.success { color: var(--green); }
    .upload-status.error { color: var(--red); }

    .retry-btn {
      background: none;
      border: none;
      color: var(--orange);
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      text-decoration: underline;
      margin-top: 0.25rem;
    }

    /* Recent uploads */
    .recent-section {
      margin-top: 1rem;
    }

    .recent-title {
      font-family: 'Baloo 2', cursive;
      font-weight: 700;
      font-size: 1.15rem;
      margin-bottom: 0.75rem;
    }

    .recent-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .recent-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--white);
      border-radius: 0.75rem;
      padding: 0.75rem 1rem;
      box-shadow: 0 2px 8px rgba(58,54,50,0.04);
    }

    .recent-thumb {
      width: 48px;
      height: 48px;
      border-radius: 0.5rem;
      object-fit: cover;
      background: var(--cream);
    }

    .recent-info { flex: 1; }

    .recent-name {
      font-weight: 700;
      font-size: 0.9rem;
    }

    .recent-game {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .badge {
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.2rem 0.6rem;
      border-radius: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .badge-pending {
      background: rgba(245,196,66,0.2);
      color: #B8940A;
    }

    .badge-approved {
      background: rgba(56,161,105,0.15);
      color: var(--green);
    }

    /* Loading */
    .page-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      flex-direction: column;
      gap: 1rem;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 4px solid rgba(109,206,197,0.3);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    .spinner-sm {
      width: 18px;
      height: 18px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: var(--white);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .hidden { display: none !important; }

    @media (max-width: 700px) {
      .cards {
        grid-template-columns: 1fr;
        gap: 1rem;
      }

      .card { padding: 1.25rem; }
      .card-icon { width: 56px; height: 56px; }
      .greeting { font-size: 1.3rem; }
      .container { padding: 1.5rem 1rem 2.5rem; }
    }

    @media (max-width: 400px) {
      .nav { padding: 0.5rem 1rem; }
      .nav-logo { height: 28px; }
    }
  </style>
</head>
<body>

<!-- Nav -->
<nav class="nav">
  <img src="/lockup.png" alt="Land Far Away" class="nav-logo">
  <div class="nav-right">
    <span class="nav-name" id="nav-name"></span>
    <button class="nav-logout" id="logout-btn">Log out</button>
  </div>
</nav>

<!-- Loading -->
<div class="page-loading" id="page-loading">
  <div class="spinner"></div>
  <span style="color:var(--muted)">Loading your dashboard…</span>
</div>

<!-- Dashboard -->
<div class="container hidden" id="dashboard">
  <h1 class="greeting" id="greeting"></h1>

  <div class="kid-tabs" id="kid-tabs"></div>

  <div class="cards" id="cards">
    <!-- Peek-a-Boo -->
    <div class="card" id="card-peekaboo">
      <img src="/peekaboo_icon.png" alt="Peek-a-Boo" class="card-icon">
      <div class="card-title">Peek-a-Boo 🙈</div>
      <div class="card-desc">Record a surprise peek-a-boo moment!</div>
      <div class="card-actions">
        <button class="btn" id="btn-peekaboo">Upload Video</button>
      </div>
      <div class="progress-wrap hidden" id="progress-peekaboo"><div class="progress-bar"></div></div>
      <div class="upload-status hidden" id="status-peekaboo"></div>
    </div>

    <!-- Good Morning / Good Night -->
    <div class="card" id="card-gmgn">
      <img src="/gmgn_icon.png" alt="Good Morning / Good Night" class="card-icon">
      <div class="card-title">Good Morning / Good Night 🌅🌙</div>
      <div class="card-desc">Send a morning or bedtime message</div>
      <div class="card-actions">
        <button class="btn" id="btn-morning">☀️ Good Morning</button>
        <button class="btn btn-outline" id="btn-night">🌙 Good Night</button>
      </div>
      <div class="progress-wrap hidden" id="progress-gmgn"><div class="progress-bar"></div></div>
      <div class="upload-status hidden" id="status-gmgn"></div>
    </div>

    <!-- Draw With Me -->
    <div class="card" id="card-drawwithme">
      <img src="/drawwithme_icon.png" alt="Draw With Me" class="card-icon">
      <div class="card-title">Draw With Me 🎨</div>
      <div class="card-desc">Share a drawing or artwork!</div>
      <div class="card-actions">
        <button class="btn" id="btn-drawwithme">Upload Image</button>
      </div>
      <div class="progress-wrap hidden" id="progress-drawwithme"><div class="progress-bar"></div></div>
      <div class="upload-status hidden" id="status-drawwithme"></div>
    </div>
  </div>

  <!-- Recent uploads -->
  <div class="recent-section" id="recent-section">
    <div class="recent-title">Recently uploaded</div>
    <div class="recent-list" id="recent-list"></div>
  </div>
</div>

<!-- Hidden file inputs -->
<input type="file" id="file-peekaboo" accept=".mp4,.mov,.m4v,video/mp4,video/quicktime" class="hidden">
<input type="file" id="file-morning" accept=".mp4,.mov,.m4v,video/mp4,video/quicktime" class="hidden">
<input type="file" id="file-night" accept=".mp4,.mov,.m4v,video/mp4,video/quicktime" class="hidden">
<input type="file" id="file-drawwithme" accept=".jpg,.jpeg,.png,.heic,.webp,image/*" class="hidden">

<script>
(function() {
  const API = 'https://api.landfaraway.co';
  const token = localStorage.getItem('contributorToken');

  if (!token) {
    window.location.href = '/contribute/login.html';
    return;
  }

  const headers = { 'Authorization': 'Bearer ' + token };

  let contributor = null;
  let children = [];
  let activeChildIdx = 0;

  const pageLoading = document.getElementById('page-loading');
  const dashboard = document.getElementById('dashboard');
  const navName = document.getElementById('nav-name');
  const greetingEl = document.getElementById('greeting');
  const kidTabsEl = document.getElementById('kid-tabs');

  // Logout
  document.getElementById('logout-btn').addEventListener('click', function() {
    localStorage.removeItem('contributorToken');
    localStorage.removeItem('contributorEmail');
    window.location.href = '/contribute/login.html';
  });

  // Load profile
  async function loadProfile() {
    try {
      const res = await fetch(API + '/contributors/me', { headers });

      if (res.status === 401) {
        localStorage.removeItem('contributorToken');
        localStorage.removeItem('contributorEmail');
        window.location.href = '/contribute/login.html';
        return;
      }

      if (!res.ok) throw new Error('Failed to load profile');

      const data = await res.json();
      contributor = data.contributor;
      children = data.children || [];

      navName.textContent = contributor.name || contributor.email;
      const displayName = contributor.name ? contributor.name.split(' ')[0] : 'there';
      greetingEl.textContent = 'Hi ' + displayName + "! Here's what you can add for the kids 👋";

      renderKidTabs();
      pageLoading.classList.add('hidden');
      dashboard.classList.remove('hidden');
      loadRecent();
    } catch (e) {
      pageLoading.innerHTML = '<p style="color:var(--red);font-weight:600">Failed to load your profile. Please try again later.</p>';
    }
  }

  function renderKidTabs() {
    kidTabsEl.innerHTML = '';
    if (children.length <= 1) {
      if (children.length === 1) {
        kidTabsEl.innerHTML = '<span style="font-family:Baloo 2,cursive;font-weight:700;font-size:1.1rem;color:var(--teal-dark)">' +
          escHtml(children[0].firstName) + (children[0].age != null ? ' (age ' + children[0].age + ')' : '') + '</span>';
      }
      return;
    }

    children.forEach(function(child, idx) {
      var btn = document.createElement('button');
      btn.className = 'kid-tab' + (idx === activeChildIdx ? ' active' : '');
      btn.textContent = child.firstName;
      btn.addEventListener('click', function() {
        activeChildIdx = idx;
        renderKidTabs();
        resetAllCards();
        loadRecent();
      });
      kidTabsEl.appendChild(btn);
    });
  }

  function getActiveChildId() {
    return children[activeChildIdx] ? children[activeChildIdx].id : null;
  }

  // Upload helper
  function uploadFile(file, gameSlug, fieldName, extraFields) {
    return new Promise(function(resolve, reject) {
      var childId = getActiveChildId();
      if (!childId) return reject(new Error('No child selected'));

      var fd = new FormData();
      fd.append(fieldName, file);
      fd.append('gameSlug', gameSlug);
      if (extraFields) {
        Object.keys(extraFields).forEach(function(k) {
          fd.append(k, extraFields[k]);
        });
      }

      var xhr = new XMLHttpRequest();
      xhr.open('POST', API + '/contributors/children/' + childId + '/media');
      xhr.setRequestHeader('Authorization', 'Bearer ' + token);

      xhr.upload.onprogress = function(e) {
        if (e.lengthComputable) {
          var pct = Math.round((e.loaded / e.total) * 100);
          resolve.onProgress && resolve.onProgress(pct);
        }
      };

      xhr.onload = function() {
        if (xhr.status >= 200 && xhr.status < 300) {
          resolve({ success: true });
        } else {
          reject(new Error('Upload failed'));
        }
      };

      xhr.onerror = function() { reject(new Error('Connection error')); };
      xhr.send(fd);
    });
  }

  // Card upload wiring
  function wireUpload(btnId, fileInputId, gameSlug, fieldName, progressId, statusId, extraFields) {
    var btn = document.getElementById(btnId);
    var fileInput = document.getElementById(fileInputId);
    var progressWrap = document.getElementById(progressId);
    var progressBar = progressWrap.querySelector('.progress-bar');
    var statusEl = document.getElementById(statusId);

    btn.addEventListener('click', function() { fileInput.click(); });

    fileInput.addEventListener('change', function() {
      var file = fileInput.files[0];
      if (!file) return;
      fileInput.value = '';

      btn.disabled = true;
      progressWrap.classList.remove('hidden');
      progressBar.style.width = '0%';
      statusEl.classList.add('hidden');
      statusEl.innerHTML = '';

      var childId = getActiveChildId();
      if (!childId) {
        showCardError(statusEl, progressWrap, btn, 'No child selected');
        return;
      }

      var fd = new FormData();
      fd.append(fieldName, file);
      fd.append('gameSlug', gameSlug);
      if (extraFields) {
        Object.keys(extraFields).forEach(function(k) {
          fd.append(k, extraFields[k]);
        });
      }

      var xhr = new XMLHttpRequest();
      xhr.open('POST', API + '/contributors/children/' + childId + '/media');
      xhr.setRequestHeader('Authorization', 'Bearer ' + token);

      xhr.upload.onprogress = function(e) {
        if (e.lengthComputable) {
          progressBar.style.width = Math.round((e.loaded / e.total) * 100) + '%';
        }
      };

      xhr.onload = function() {
        progressWrap.classList.add('hidden');
        btn.disabled = false;
        statusEl.classList.remove('hidden');
        if (xhr.status >= 200 && xhr.status < 300) {
          statusEl.className = 'upload-status success';
          statusEl.textContent = '✓ Sent for review!';
          loadRecent();
        } else {
          showCardError(statusEl, progressWrap, btn, 'Upload failed — please try again');
        }
      };

      xhr.onerror = function() {
        showCardError(statusEl, progressWrap, btn, 'Connection error — please try again');
      };

      xhr.send(fd);
    });
  }

  function showCardError(statusEl, progressWrap, btn, msg) {
    progressWrap.classList.add('hidden');
    btn.disabled = false;
    statusEl.classList.remove('hidden');
    statusEl.className = 'upload-status error';
    statusEl.textContent = msg;
  }

  function resetAllCards() {
    ['peekaboo', 'gmgn', 'drawwithme'].forEach(function(slug) {
      var pw = document.getElementById('progress-' + slug);
      var st = document.getElementById('status-' + slug);
      if (pw) pw.classList.add('hidden');
      if (st) { st.classList.add('hidden'); st.innerHTML = ''; }
    });
  }

  // Wire up all uploads
  wireUpload('btn-peekaboo', 'file-peekaboo', 'peekaboo', 'video', 'progress-peekaboo', 'status-peekaboo');
  wireUpload('btn-morning', 'file-morning', 'gmgn', 'video', 'progress-gmgn', 'status-gmgn', { gmgnMode: 'morning' });
  wireUpload('btn-night', 'file-night', 'gmgn', 'video', 'progress-gmgn', 'status-gmgn', { gmgnMode: 'night' });
  wireUpload('btn-drawwithme', 'file-drawwithme', 'drawwithme', 'image', 'progress-drawwithme', 'status-drawwithme');

  // Recent uploads
  async function loadRecent() {
    var childId = getActiveChildId();
    if (!childId) {
      document.getElementById('recent-section').classList.add('hidden');
      return;
    }

    try {
      var res = await fetch(API + '/contributors/children/' + childId + '/media', { headers });
      if (!res.ok) {
        document.getElementById('recent-section').classList.add('hidden');
        return;
      }

      var data = await res.json();
      var items = data.media || data || [];
      var list = document.getElementById('recent-list');

      if (!items.length) {
        document.getElementById('recent-section').classList.add('hidden');
        return;
      }

      document.getElementById('recent-section').classList.remove('hidden');
      var gameName = { peekaboo: 'Peek-a-Boo', gmgn: 'Good Morning / Good Night', drawwithme: 'Draw With Me' };

      list.innerHTML = items.slice(0, 10).map(function(item) {
        var badge = item.status === 'approved'
          ? '<span class="badge badge-approved">Approved</span>'
          : '<span class="badge badge-pending">Pending</span>';

        var thumb = item.thumbnailUrl
          ? '<img class="recent-thumb" src="' + escAttr(item.thumbnailUrl) + '" alt="">'
          : '<div class="recent-thumb" style="display:flex;align-items:center;justify-content:center;font-size:1.5rem">' +
            (item.gameSlug === 'drawwithme' ? '🎨' : '🎬') + '</div>';

        return '<div class="recent-item">' + thumb +
          '<div class="recent-info"><div class="recent-name">' + escHtml(item.displayName || gameName[item.gameSlug] || item.gameSlug) +
          '</div><div class="recent-game">' + escHtml(gameName[item.gameSlug] || item.gameSlug) + '</div></div>' +
          badge + '</div>';
      }).join('');
    } catch (e) {
      document.getElementById('recent-section').classList.add('hidden');
    }
  }

  function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function escAttr(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  loadProfile();
})();
</script>
</body>
</html>
